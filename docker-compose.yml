services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jukebox
      POSTGRES_USER: jukebox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jukebox}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jukebox"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://jukebox:${POSTGRES_PASSWORD:-jukebox}@db:5432/jukebox
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      APP_BASE_URL: ${APP_BASE_URL:-https://automaite.ca}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://automaite.ca,http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://automaite.ca}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://automaite.ca}
    depends_on:
      - api
    restart: unless-stopped

  relay:
    build: ./relay
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      AUTH_EMAIL: ${TERMINAL_AUTH_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      AGENT_KEY: ${TERMINAL_AGENT_KEY}
      JWT_SECRET: ${TERMINAL_JWT_SECRET}
      KEYSTORE_SECRET: ${KEYSTORE_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
    volumes:
      - relay_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./automaite-site:/srv/automaite-site:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - relay
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  relay_data:

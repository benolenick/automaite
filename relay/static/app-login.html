<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Automaite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .sub { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    #g-signin { display: inline-block; margin-bottom: 1rem; }
    #status {
      color: #7c3aed;
      font-size: 0.9rem;
      margin-top: 1rem;
      min-height: 1.5em;
    }
    #error { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Automaite Terminal</h1>
    <p class="sub">Sign in to continue to the app</p>
    <div id="g-signin"></div>
    <div id="status"></div>
    <div id="error"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="/app-login.js"></script>
</body>
</html>
